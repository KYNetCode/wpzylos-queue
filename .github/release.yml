changelog:
  exclude:
    labels:
      - skip-changelog
  categories:
    - title: 🚀 Features
      labels:
        - enhancement
        - feature
    - title: 🐛 Bug Fixes
      labels:
        - bug
        - fix
    - title: 📖 Documentation
      labels:
        - documentation
    - title: 🧰 Maintenance
      labels:
        - chore
        - maintenance
        - dependencies
    - title: 🔒 Security
      labels:
        - security
